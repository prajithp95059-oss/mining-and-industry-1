<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | STACKLY Mining & Industry</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@300;400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--gold:#D4A017;--gold-light:#F5C842;--dark:#0A0A0A;--dark-2:#111111;--dark-3:#1A1A1A;--white:#F0EDE8;--gray:#888;--font-display:'Playfair Display',serif;--font-heading:'Montserrat',sans-serif;--font-body:'Rajdhani',sans-serif;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--white);font-family:var(--font-body);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}
::selection{background:var(--gold);color:var(--dark);}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.25;}

/* NAV */
nav{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 60px;display:flex;align-items:center;justify-content:space-between;height:80px;background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,160,23,0.15);transition:all 0.4s ease;overflow:hidden;}
nav.scrolled{height:60px;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;min-width:0;overflow:hidden;}
.nav-logo-img{height:44px;max-width:180px;width:auto;}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-links a{color:var(--white);text-decoration:none;font-size:0.78rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;border-radius:4px;transition:all 0.3s ease;position:relative;}
.nav-links a::before{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s ease;}
.nav-links a:hover{color:var(--gold);}
.nav-links a:hover::before{width:100%;}
.nav-cta{background:var(--gold);color:var(--dark)!important;font-weight:700!important;padding:10px 22px!important;border-radius:4px;}
.nav-cta:hover{background:var(--gold-light)!important;}
.hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;width:40px;height:40px;cursor:pointer;padding:4px;position:relative;flex-shrink:0;z-index:1001;}
.hamburger span{display:block;width:26px;height:2px;background:var(--gold);border-radius:1px;position:absolute;transition:transform 0.35s cubic-bezier(0.23,1,0.32,1),opacity 0.25s ease;transform-origin:center;}
.hamburger span:nth-child(1){transform:translateY(-7px);}
.hamburger span:nth-child(2){transform:translateY(0);}
.hamburger span:nth-child(3){transform:translateY(7px);}
.hamburger.is-open span:nth-child(1){transform:translateY(0) rotate(45deg);}
.hamburger.is-open span:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger.is-open span:nth-child(3){transform:translateY(0) rotate(-45deg);}
.mobile-menu{display:none;position:fixed;top:80px;left:0;width:100%;background:rgba(10,10,10,0.98);backdrop-filter:blur(20px);padding:30px;flex-direction:column;gap:8px;border-bottom:1px solid rgba(212,160,23,0.2);z-index:999;}
.mobile-menu.open{display:flex;}
.mobile-menu a{color:var(--white);text-decoration:none;font-size:1rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);transition:color 0.3s;}
.mobile-menu a:hover{color:var(--gold);}

/* 404 HERO */
.error-hero{position:relative;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:1;padding:160px 40px 100px;text-align:center;}
.error-bg{position:absolute;inset:0;z-index:0;background:linear-gradient(135deg,rgba(10,10,10,0.92) 0%,rgba(26,16,8,0.88) 50%,rgba(10,10,10,0.95) 100%),url('https://images.unsplash.com/photo-1565008447742-97f6f38c985c?w=1920&q=80');background-size:cover;background-position:center;}
.error-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(212,160,23,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(212,160,23,0.05) 1px,transparent 1px);background-size:60px 60px;z-index:1;animation:gridShift 20s linear infinite;}
@keyframes gridShift{0%{background-position:0 0}100%{background-position:60px 60px}}
.error-dust{position:absolute;inset:0;z-index:2;background:radial-gradient(ellipse 70% 55% at 50% 45%,rgba(212,160,23,0.10) 0%,transparent 70%);animation:pulse 4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
.error-content{position:relative;z-index:3;max-width:680px;}
.error-eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:0.72rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;opacity:0;}
.error-eyebrow::before,.error-eyebrow::after{content:'';display:block;width:36px;height:1px;background:var(--gold);}
.error-code{font-family:var(--font-display);font-size:clamp(7rem,20vw,12rem);line-height:0.85;letter-spacing:4px;color:var(--white);margin-bottom:8px;opacity:0;}
.error-code .gold{color:var(--gold);}
.error-title{font-family:var(--font-heading);font-size:clamp(1.3rem,3vw,1.8rem);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--white);margin-bottom:18px;opacity:0;}
.error-desc{color:var(--gray);font-size:0.95rem;line-height:1.8;margin-bottom:44px;opacity:0;}
.error-btns{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;opacity:0;}
.btn-primary,.btn-outline{font-family:var(--font-heading);font-size:0.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:16px 38px;border-radius:3px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:10px;transition:all 0.3s ease;border:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-3px);box-shadow:0 15px 40px rgba(212,160,23,0.4);}
.btn-outline{border:1px solid rgba(212,160,23,0.6);color:var(--white);background:transparent;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,0.08);transform:translateY(-3px);}
.error-links{margin-top:48px;opacity:0;}
.error-links p{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:14px;}
.error-links-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.error-links-row a{color:var(--gray);text-decoration:none;font-size:0.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border:1px solid rgba(212,160,23,0.15);border-radius:30px;transition:all 0.3s;}
.error-links-row a:hover{color:var(--gold);border-color:var(--gold);background:rgba(212,160,23,0.06);}

/* FOOTER */
footer{background:var(--dark-2);padding:80px 60px 30px;border-top:1px solid rgba(212,160,23,0.1);position:relative;z-index:1;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px;margin-bottom:60px;}
.footer-logo{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.footer-logo-img{height:40px;width:auto;}
.footer-desc{color:#666;font-size:0.88rem;line-height:1.8;margin-bottom:28px;}
.footer-socials{display:flex;gap:10px;}
.social-btn{width:40px;height:40px;border:1px solid rgba(212,160,23,0.3);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:0.9rem;text-decoration:none;transition:all 0.3s;}
.social-btn:hover{background:var(--gold);color:var(--dark);border-color:var(--gold);transform:translateY(-3px);}
.footer-heading{font-family:var(--font-heading);font-size:0.85rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:10px;}
.footer-links a{color:#666;text-decoration:none;font-size:0.88rem;transition:color 0.3s;}
.footer-links a:hover{color:var(--gold);}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:30px;border-top:1px solid rgba(255,255,255,0.05);}
.footer-copy{color:#555;font-size:0.8rem;}
.footer-bottom-links{display:flex;gap:24px;}
.footer-bottom-links a{color:#555;font-size:0.8rem;text-decoration:none;transition:color 0.3s;}
.footer-bottom-links a:hover{color:var(--gold);}

/* MEDIA */
@media(max-width:992px){nav{padding:0 30px;} .nav-links{display:none;} .hamburger{display:flex;} .footer-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){nav{padding:0 20px;} .nav-logo-img{height:36px;max-width:140px;} .error-hero{padding:150px 24px 80px;} .error-btns{flex-direction:column;align-items:center;} .btn-primary,.btn-outline{width:100%;max-width:300px;justify-content:center;} footer{padding:60px 20px 24px;} .footer-grid{grid-template-columns:1fr;gap:40px;} .footer-bottom{flex-direction:column;gap:16px;text-align:center;}}
@media(max-width:480px){.nav-logo-img{height:32px;max-width:118px;} .error-hero{padding:140px 18px 60px;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>



<!-- 404 HERO -->
<section class="error-hero">
  <div class="error-bg"></div>
  <div class="error-grid"></div>
  <div class="error-dust"></div>
  <div class="error-content">
    <div class="error-eyebrow" id="e-eyebrow">Site Excavation Required</div>
    <h1 class="error-code" id="e-code">4<span class="gold">0</span>4</h1> <br> <br>
    <h2 class="error-title" id="e-title">This Vein Has Run Dry</h2>
    <p class="error-desc" id="e-desc">The page you're looking for doesn't exist, has been moved, or never made it past the feasibility study. Let's get you back to solid ground.</p>
    <div class="error-btns" id="e-btns">
      <button class="btn-outline" onclick="goBack()">← Go Back</button>
      <a href="index.html" class="btn-primary">Return to Home →</a>
    </div>
    <!-- <div class="error-links" id="e-links">
      <p>Or try one of these</p>
      <div class="error-links-row">
        <a href="error.html">About</a>
        <a href="error.html">Services</a>
        <a href="error.html">Projects</a>
        <a href="error.html">Contact</a>
      </div>
    </div> -->
  </div>
</section>


<script>
/* PARTICLE BG */
const canvas=document.getElementById('bg-canvas');const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}resize();window.addEventListener('resize',resize);
let particles=[];
class P{constructor(){this.reset();}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.3;this.vy=(Math.random()-0.5)*0.3;this.size=Math.random()*1.2+0.2;this.alpha=Math.random()*0.4+0.1;this.color=Math.random()>0.7?'#D4A017':'#ffffff';}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=this.color;ctx.globalAlpha=this.alpha;ctx.fill();}}
for(let i=0;i<100;i++)particles.push(new P());
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});ctx.globalAlpha=1;requestAnimationFrame(animate);}animate();

/* NAV */
window.addEventListener('scroll',()=>{document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>80);});
function toggleMenu(){
  document.getElementById('mobileMenu').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('is-open');
}

/* BACK BUTTON — goes to the previous page in history, falls back to home if there is none */
function goBack(){
  if(window.history.length > 1){
    window.history.back();
  } else {
    window.location.href = 'index.html';
  }
}

/* ENTRANCE ANIMATION */
gsap.timeline({delay:0.2,defaults:{ease:'power3.out'}})
  .fromTo('#e-eyebrow',{opacity:0,y:20},{opacity:1,y:0,duration:0.6})
  .fromTo('#e-code',{opacity:0,y:50,scale:0.9},{opacity:1,y:0,scale:1,duration:0.9,ease:'power4.out'},'-=0.2')
  .fromTo('#e-title',{opacity:0,y:20},{opacity:1,y:0,duration:0.6},'-=0.3')
  .fromTo('#e-desc',{opacity:0,y:20},{opacity:1,y:0,duration:0.6},'-=0.3')
  .fromTo('#e-btns',{opacity:0,y:20},{opacity:1,y:0,duration:0.6},'-=0.3')
  .fromTo('#e-links',{opacity:0,y:20},{opacity:1,y:0,duration:0.6},'-=0.3');
</script>
</body>
</html>
